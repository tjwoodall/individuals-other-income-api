summary: Create and Amend Other Income
description: |
  This endpoint enables you to create and amend other income:
  business receipts, overseas income and gains, chargeable foreign benefits and gifts, omitted foreign income, and all other income received whilst abroad.  
  A National Insurance number and tax year must be provided.

  ###  Test data
  Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.
  

  | Header Value (Gov-Test-Scenario) | Scenario                                                                                                  |
  | -------------------------------- | --------------------------------------------------------------------------------------------------------- |
  | N/A - DEFAULT                    | Simulates success response.                                                                               |
  | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window.           |
  | STATEFUL                         | Performs a stateful create or update.                                                                     |

parameters:
  - $ref: './common/pathParameters.yaml#/components/parameters/nino'
  - $ref: './common/pathParameters.yaml#/components/parameters/taxYearMinimum2025'
  - $ref: './common/headers.yaml#/components/parameters/acceptHeader'
  - $ref: './common/headers.yaml#/components/parameters/contentTypeJson'
  - $ref: './common/headers.yaml#/components/parameters/authorizationWriteScopeHeader'
  - $ref: './common/headers.yaml#/components/parameters/testScenarioHeader'


security:
  - User-Restricted:
      - write:self-assessment

requestBody:
  content:
    application/json:
      schema:
          $ref: './schemas/other_create_amend/def1/request.json'
      examples:
        TY 2025-26:
          description: Full Other Income Amendment
          value:
            $ref: './examples/other_create_amend/def1/request.json'
responses:
  "204":
    description: No Content
    headers:
      X-CorrelationId:
        $ref: './common/headers.yaml#/components/parameters/correlationId'
  "400":
    description: Bad request
    headers:
      X-CorrelationId:
        $ref: './common/headers.yaml#/components/parameters/correlationId'
    content:
      application/json:
        schema:
          $ref: './schemas/error_response.yaml'
        examples:
          FORMAT_NINO:
            $ref: './common/errors.yaml#/components/examples/formatNino'
          FORMAT_TAX_YEAR:
            $ref: './common/errors.yaml#/components/examples/formatTaxYear'
          RULE_TAX_YEAR_NOT_SUPPORTED:
            $ref: './common/errors.yaml#/components/examples/ruleTaxYearNotSupported'
          RULE_TAX_YEAR_RANGE_INVALID:
            $ref: './common/errors.yaml#/components/examples/ruleTaxYearRangeInvalid'
          FORMAT_COUNTRY_CODE:
            $ref: './common/errors.yaml#/components/examples/formatCountryCode'
          RULE_COUNTRY_CODE:
            $ref: './common/errors.yaml#/components/examples/ruleCountryCode'
          FORMAT_VALUE:
            $ref: './common/errors.yaml#/components/examples/formatValue'
          FORMAT_DATE:
            $ref: './common/errors.yaml#/components/examples/formatDate'
          FORMAT_CUSTOMER_REFERENCE:
            $ref: './common/errors.yaml#/components/examples/formatCustomerReference'
          FORMAT_BUSINESS_NAME:
            $ref: './common/errors.yaml#/components/examples/formatBusinessName'
          FORMAT_BUSINESS_DESCRIPTION:
            $ref: './common/errors.yaml#/components/examples/formatBusinessDescription'
          FORMAT_INCOME_SOURCE:
            $ref: './common/errors.yaml#/components/examples/formatIncomeSource'
          RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED:
            $ref: './common/errors.yaml#/components/examples/ruleIncorrectOrEmptyBody'
          RULE_UNALIGNED_CESSATION_TAX_YEAR:
            $ref: './common/errors.yaml#/components/examples/ruleUnalignedCessationTaxYear'
          RULE_INCORRECT_GOV_TEST_SCENARIO:
            $ref: './common/errors.yaml#/components/examples/ruleIncorrectGovTestScenario'
          RULE_OUTSIDE_AMENDMENT_WINDOW:
            $ref: './common/errors.yaml#/components/examples/ruleOutsideAmendmentWindow'

  "403":
    description: Forbidden
    headers:
      X-CorrelationId:
        $ref: './common/headers.yaml#/components/parameters/correlationId'
    content:
      application/json:
        schema:
          $ref: './schemas/error_response.yaml'
        examples:
          CLIENT_OR_AGENT_NOT_AUTHORISED:
            $ref: './common/errors.yaml#/components/examples/clientOrAgentNotAuthorised'
